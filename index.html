<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>칵테일 취향 찾기</title>
    <meta
      name="description"
      content="대표 칵테일 35종에 반응하고 나의 취향 유형과 맞춤 추천을 받아보세요."
    />
    <meta property="og:title" content="🍸 나의 칵테일 취향 찾기" />
    <meta
      property="og:description"
      content="35종 칵테일에 반응하면 취향 레이더와 맞춤 추천까지. 나는 어떤 칵테일파일까?"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://hyexjun.github.io/cocktail-taste"
    />
    <meta
      property="og:image"
      content="https://hyexjun.github.io/cocktail-taste/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="🍸 나의 칵테일 취향 찾기" />
    <meta
      name="twitter:description"
      content="35종 칵테일에 반응하면 취향 레이더와 맞춤 추천까지."
    />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

      :root {
        --bg: #0f0c10;
        --surface: #1a1520;
        --surface2: #221c2a;
        --border: #2e2438;
        --amber: #c9942a;
        --amber-lt: #e8b84b;
        --rose: #c45c72;
        --sage: #7aaa8a;
        --slate: #8b90a8;
        --txt: #ede8f0;
        --muted: #7b7485;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--txt);
        font-family: 'Noto Sans KR', sans-serif;
        font-weight: 300;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }

      /* ── 공통 유틸 ── */
      .hidden {
        display: none !important;
      }

      /* ══════════════════════════════
   SCREEN 1: INTRO
══════════════════════════════ */
      #screen-intro {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
        text-align: center;
      }
      .intro-glow {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(201, 148, 42, 0.25) 0%,
          transparent 70%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 52px;
        margin-bottom: 32px;
      }
      #screen-intro h1 {
        font-family: 'Playfair Display', serif;
        font-size: clamp(26px, 5vw, 38px);
        font-weight: 400;
        line-height: 1.3;
        margin-bottom: 14px;
      }
      #screen-intro h1 em {
        font-style: italic;
        color: var(--amber-lt);
      }
      #screen-intro p {
        font-size: 14px;
        color: var(--muted);
        max-width: 340px;
        line-height: 1.8;
        margin-bottom: 36px;
      }
      .btn-start {
        padding: 14px 36px;
        background: linear-gradient(135deg, #4a3820, #2e2010);
        border: 1px solid var(--amber);
        border-radius: 100px;
        color: var(--amber-lt);
        font-size: 15px;
        font-weight: 500;
        font-family: 'Noto Sans KR', sans-serif;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .btn-start:hover {
        opacity: 0.8;
      }
      .btn-start:disabled {
        opacity: 0.35;
        cursor: default;
      }

      /* 닉네임 입력 */
      .nickname-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        margin-bottom: 24px;
        width: 100%;
        max-width: 280px;
      }
      .nickname-input {
        width: 100%;
        padding: 12px 18px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 100px;
        color: var(--txt);
        font-size: 15px;
        font-family: 'Noto Sans KR', sans-serif;
        font-weight: 400;
        text-align: center;
        outline: none;
        transition: border-color 0.2s;
      }
      .nickname-input::placeholder {
        color: var(--muted);
      }
      .nickname-input:focus {
        border-color: var(--amber);
      }
      .nickname-hint {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.05em;
      }

      /* 공유 결과 배너 */
      .shared-banner {
        background: var(--surface);
        border: 1px solid var(--border);
        border-top: 3px solid var(--amber);
        border-radius: 12px;
        padding: 18px 20px;
        text-align: center;
        margin-bottom: 0;
      }
      .shared-banner .sb-label {
        font-size: 11px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--amber);
        margin-bottom: 8px;
      }
      .shared-banner .sb-name {
        font-family: 'Playfair Display', serif;
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 14px;
      }
      .shared-banner .sb-name em {
        font-style: italic;
        color: var(--amber-lt);
      }
      .btn-try {
        padding: 10px 28px;
        background: linear-gradient(135deg, #4a3820, #2e2010);
        border: 1px solid var(--amber);
        border-radius: 100px;
        color: var(--amber-lt);
        font-size: 13px;
        font-weight: 500;
        font-family: 'Noto Sans KR', sans-serif;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .btn-try:hover {
        opacity: 0.8;
      }

      /* ══════════════════════════════
   SCREEN 2: QUIZ
══════════════════════════════ */
      #screen-quiz {
        display: flex;
        flex-direction: column;
        position: fixed;
        inset: 0;
        max-width: 540px;
        margin: 0 auto;
        width: 100%;
        padding: 0 20px 0;
        overflow: hidden;
        touch-action: none;
        overscroll-behavior: none;
      }

      #screen-intro {
        touch-action: none;
        overscroll-behavior: none;
      }

      /* 상단 바 */
      .quiz-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0;
        gap: 12px;
        flex-shrink: 0;
        min-height: 35px;
      }
      .progress-wrap {
        flex: 1;
      }
      .progress-label {
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.1em;
        margin-bottom: 6px;
      }
      .progress-bar-bg {
        height: 5px;
        background: var(--surface2);
        border-radius: 100px;
      }
      .progress-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--amber), var(--amber-lt));
        border-radius: 100px;
        transition: width 0.4s ease;
      }
      .btn-back {
        background: none;
        border: 1px solid var(--border);
        border-radius: 8px;
        color: #a09ab0;
        font-size: 12px;
        padding: 9px 12px;
        font-family: 'Noto Sans KR', sans-serif;
        cursor: pointer;
        white-space: nowrap;
        transition:
          border-color 0.15s,
          color 0.15s;
      }
      .btn-back:hover {
        border-color: var(--muted);
        color: var(--txt);
      }
      .btn-back:disabled {
        opacity: 0.3;
        cursor: default;
      }

      /* 카드 */
      .card-area {
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .card-btn-wrap {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .cocktail-card {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        overflow: hidden;
        animation: cardIn 0.3s ease;
      }
      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(12px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .card-visual {
        height: 140px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 64px;
        position: relative;
        overflow: hidden;
      }
      .card-visual::before {
        content: '';
        position: absolute;
        inset: 0;
        opacity: 0.55;
      }
      .card-body {
        padding: 16px 20px 18px;
      }
      .card-spirit {
        font-size: 12px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--amber);
        margin-bottom: 6px;
      }
      .card-name {
        font-family: 'Playfair Display', serif;
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .card-desc {
        font-size: 13px;
        color: #b0aabb;
        line-height: 1.7;
        min-height: calc(13px * 1.7 * 3);
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 12px;
      }
      .card-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .ctag {
        font-size: 11px;
        padding: 3px 10px;
        border-radius: 100px;
        border: 1px solid;
      }
      .ctag-herb {
        background: rgba(122, 170, 138, 0.12);
        color: var(--sage);
        border-color: rgba(122, 170, 138, 0.25);
      }
      .ctag-spice {
        background: rgba(201, 148, 42, 0.12);
        color: var(--amber-lt);
        border-color: rgba(201, 148, 42, 0.25);
      }
      .ctag-citrus {
        background: rgba(232, 184, 75, 0.12);
        color: #d4b86a;
        border-color: rgba(232, 184, 75, 0.25);
      }
      .ctag-sweet {
        background: rgba(196, 92, 114, 0.12);
        color: var(--rose);
        border-color: rgba(196, 92, 114, 0.25);
      }
      .ctag-dry {
        background: rgba(139, 144, 168, 0.12);
        color: var(--slate);
        border-color: rgba(139, 144, 168, 0.25);
      }
      .ctag-fruity {
        background: rgba(180, 130, 200, 0.12);
        color: #c0a0e0;
        border-color: rgba(180, 130, 200, 0.25);
      }
      .ctag-sour {
        background: rgba(180, 200, 100, 0.12);
        color: #b0c870;
        border-color: rgba(180, 200, 100, 0.25);
      }
      .ctag-nutty {
        background: rgba(160, 120, 80, 0.12);
        color: #c0946a;
        border-color: rgba(160, 120, 80, 0.25);
      }
      .ctag-savory {
        background: rgba(100, 160, 120, 0.12);
        color: #80c090;
        border-color: rgba(100, 160, 120, 0.25);
      }
      .ctag-bitter {
        background: rgba(80, 80, 120, 0.12);
        color: #9090c0;
        border-color: rgba(80, 80, 120, 0.25);
      }
      .ctag-tropical {
        background: rgba(220, 180, 80, 0.12);
        color: #d4b050;
        border-color: rgba(220, 180, 80, 0.25);
      }
      .ctag-fizzy {
        background: rgba(140, 180, 220, 0.12);
        color: #90b8d8;
        border-color: rgba(140, 180, 220, 0.25);
      }
      .ctag-creamy {
        background: rgba(220, 200, 180, 0.12);
        color: #d4b898;
        border-color: rgba(220, 200, 180, 0.25);
      }

      /* 구체 키워드 태그 색상 */
      .ctag-coffee {
        background: rgba(120, 80, 40, 0.15);
        color: #c8946a;
        border-color: rgba(120, 80, 40, 0.3);
      }
      .ctag-ginger {
        background: rgba(210, 140, 40, 0.12);
        color: #d4a050;
        border-color: rgba(210, 140, 40, 0.25);
      }
      .ctag-mint {
        background: rgba(80, 200, 160, 0.12);
        color: #60c8a8;
        border-color: rgba(80, 200, 160, 0.25);
      }
      .ctag-smoky {
        background: rgba(100, 90, 80, 0.15);
        color: #a09080;
        border-color: rgba(100, 90, 80, 0.3);
      }
      .ctag-citrus-fruit {
        background: rgba(230, 180, 60, 0.12);
        color: #d4b050;
        border-color: rgba(230, 180, 60, 0.25);
      }
      .ctag-berry {
        background: rgba(180, 80, 140, 0.12);
        color: #c870a8;
        border-color: rgba(180, 80, 140, 0.25);
      }
      .ctag-tropical-fruit {
        background: rgba(220, 160, 60, 0.12);
        color: #d4a860;
        border-color: rgba(220, 160, 60, 0.25);
      }
      .ctag-vermouth {
        background: rgba(100, 140, 100, 0.12);
        color: #80b080;
        border-color: rgba(100, 140, 100, 0.25);
      }
      .ctag-cacao {
        background: rgba(100, 60, 40, 0.15);
        color: #b07858;
        border-color: rgba(100, 60, 40, 0.3);
      }
      .ctag-spicy {
        background: rgba(220, 80, 60, 0.12);
        color: #e07060;
        border-color: rgba(220, 80, 60, 0.25);
      }
      .ctag-wine {
        background: rgba(140, 40, 80, 0.12);
        color: #c06080;
        border-color: rgba(140, 40, 80, 0.25);
      }
      .ctag-tomato {
        background: rgba(200, 80, 60, 0.12);
        color: #d07060;
        border-color: rgba(200, 80, 60, 0.25);
      }
      .ctag-almond {
        background: rgba(180, 150, 100, 0.12);
        color: #c8a870;
        border-color: rgba(180, 150, 100, 0.25);
      }
      .ctag-coconut {
        background: rgba(200, 190, 170, 0.12);
        color: #c8b890;
        border-color: rgba(200, 190, 170, 0.25);
      }
      .ctag-juniper {
        background: rgba(80, 130, 90, 0.12);
        color: #70a878;
        border-color: rgba(80, 130, 90, 0.25);
      }
      .ctag-campari {
        background: rgba(200, 60, 60, 0.12);
        color: #d07070;
        border-color: rgba(200, 60, 60, 0.25);
      }
      .ctag-neutral {
        background: rgba(130, 130, 150, 0.1);
        color: #9898b0;
        border-color: rgba(130, 130, 150, 0.2);
      }

      /* 버튼 그룹 */
      .action-buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        flex-shrink: 0;
        padding-bottom: 20px;
      }
      .act-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        padding: 12px 6px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: #a09ab0;
        font-family: 'Noto Sans KR', sans-serif;
        font-size: 11px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .act-btn .act-icon {
        font-size: 20px;
        line-height: 1;
      }
      .act-btn:hover {
        border-color: var(--muted);
        color: var(--txt);
      }

      .act-btn.no {
        --c: var(--rose);
      }
      .act-btn.meh {
        --c: var(--slate);
      }
      .act-btn.like {
        --c: var(--amber-lt);
      }
      .act-btn.skip {
        --c: #a09ab0;
      }

      .act-btn.no:hover {
        border-color: var(--rose);
        color: var(--rose);
        background: rgba(196, 92, 114, 0.08);
      }
      .act-btn.meh:hover {
        border-color: var(--slate);
        color: var(--slate);
        background: rgba(139, 144, 168, 0.08);
      }
      .act-btn.like:hover {
        border-color: var(--amber-lt);
        color: var(--amber-lt);
        background: rgba(232, 184, 75, 0.08);
      }

      /* ══════════════════════════════
   SCREEN 3: RESULT
══════════════════════════════ */
      #screen-result {
        max-width: 680px;
        margin: 0 auto;
        width: 100%;
        padding: 32px 28px 80px;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .result-hero {
        text-align: center;
        padding: 24px 0 36px;
      }
      .result-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(201, 148, 42, 0.2) 0%,
          transparent 70%
        );
        border: 1px solid var(--border);
        font-size: 36px;
        margin-bottom: 20px;
      }
      .result-type-label {
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--amber);
        margin-bottom: 10px;
      }
      .result-type-name {
        font-family: 'Playfair Display', serif;
        font-size: clamp(22px, 4vw, 30px);
        font-weight: 600;
        margin-bottom: 14px;
        line-height: 1.4;
      }
      .result-type-name em {
        font-style: italic;
        color: var(--amber-lt);
      }
      .result-type-desc {
        font-size: 14px;
        color: var(--muted);
        line-height: 1.9;
        max-width: 420px;
        margin: 0 auto;
      }

      /* 섹션 타이틀 */
      .sec-title {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
      }
      .sec-title .sec-icon {
        font-size: 16px;
      }
      .sec-title h2 {
        font-family: 'Playfair Display', serif;
        font-size: 18px;
        font-weight: 600;
        white-space: nowrap;
      }
      .sec-title .rule {
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      #screen-result section {
        padding: 25px 0 25px;
        border-top: 1px solid var(--border);
      }

      /* 레이더 세로 쌓기 */
      .radar-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }

      /* 키워드 스코어 */
      .keyword-scores {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .ks-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .ks-label {
        width: 90px;
        font-size: 12px;
        color: var(--muted);
        flex-shrink: 0;
      }
      .ks-bar-bg {
        flex: 1;
        height: 6px;
        background: var(--surface2);
        border-radius: 100px;
        overflow: hidden;
      }
      .ks-bar-fill {
        height: 100%;
        border-radius: 100px;
        transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .ks-score {
        width: auto;
        min-width: 32px;
        text-align: right;
        font-size: 12px;
        color: var(--muted);
        flex-shrink: 0;
        white-space: nowrap;
      }
      .ks-score-dis {
        color: var(--rose);
      }
      .ks-count {
        font-size: 10px;
        color: var(--muted);
        opacity: 0.8;
      }
      .ks-section-title {
        font-size: 12px;
        font-weight: 500;
        margin-bottom: 10px;
        letter-spacing: 0.05em;
      }
      .ks-liked {
        color: var(--amber-lt);
      }
      .ks-disliked {
        color: var(--rose);
      }

      /* 추천 카드 */
      .rec-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 12px;
      }
      .rec-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 18px;
        transition: border-color 0.15s;
      }
      .rec-card:hover {
        border-color: var(--amber);
      }
      .rec-card .rec-emoji {
        font-size: 28px;
        margin-bottom: 10px;
      }
      .rec-card .rec-name {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 6px;
      }
      .rec-card .rec-reason {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.7;
      }
      .rec-card .rec-reason strong {
        color: var(--amber-lt);
        font-weight: 500;
      }

      /* 리뷰 테이블 */
      .review-table {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .review-row {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 12px;
        padding: 11px 14px;
        background: var(--surface);
        border-radius: 8px;
        font-size: 13px;
      }
      .review-row .rr-name {
        font-weight: 500;
        line-height: 1.4;
      }
      .review-row .rr-note {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }
      .rtag-like {
        color: var(--amber-lt);
        font-size: 11px;
        white-space: nowrap;
      }
      .rtag-meh {
        color: var(--slate);
        font-size: 11px;
        white-space: nowrap;
      }
      .rtag-no {
        color: var(--rose);
        font-size: 11px;
        white-space: nowrap;
      }

      /* 다시하기 */
      .restart-wrap {
        text-align: center;
        padding: 25px 0 0;
        border-top: 1px solid var(--border);
      }
      .btn-restart {
        padding: 12px 32px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 100px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 500;
        font-family: 'Noto Sans KR', sans-serif;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-restart:hover {
        border-color: var(--amber);
        color: var(--amber-lt);
      }

      /* ── 레이더 차트 ── */
      .radar-block {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px 16px 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .radar-block-title {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--muted);
        text-align: center;
      }
      .radar-svg {
        overflow: visible;
      }

      /* 폴리곤 그리기 애니메이션 */
      @keyframes radarIn {
        from {
          opacity: 0;
          transform: scale(0.85);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .radar-fill {
        animation: radarIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
        transform-box: fill-box;
        transform-origin: center;
      }

      /* ── 저장·공유 버튼 ── */
      .action-row {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-bottom: 10px;
        flex-wrap: nowrap;
      }
      .btn-action {
        padding: 10px 16px;
        border-radius: 100px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--txt);
        font-size: 13px;
        font-weight: 500;
        font-family: 'Noto Sans KR', sans-serif;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .btn-save:hover {
        border-color: var(--amber);
        color: var(--amber-lt);
      }
      .btn-share:hover {
        border-color: var(--sage);
        color: var(--sage);
      }
      .btn-restart-sm {
        padding: 10px 16px;
        border-radius: 100px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: #a09ab0;
        font-size: 13px;
        font-weight: 500;
        font-family: 'Noto Sans KR', sans-serif;
        cursor: pointer;
        white-space: nowrap;

      }
      .btn-restart-sm:hover {

          font-size: 18px;
        }

        }
      }

      function startQuiz() {

        current = 0;
        answers = {};
        history = [];
        show('screen-quiz');
        renderCard();
      }

      function renderCard() {
        const c = queue[current];
        const total = queue.length;

        document.getElementById('progress-label').textContent =
          `${current + 1} / ${total}`;
        document.getElementById('progress-bar').style.width =
          `${((current + 1) / total) * 100}%`;
        document.getElementById('btn-back').disabled = history.length === 0;

        const tagsHtml = c.labels
          .map((lbl) => {
            const cls = LABEL_CLASS[lbl] || '';
            return `<span class="ctag ${cls}">${lbl}</span>`;
          })
          .join('');

        const spiritLabel =
          c.spirit === '기타' ? '기타 (복합 스피릿)' : c.spirit;

        document.getElementById('cocktail-card').innerHTML = `
    <div class="card-visual" style="background:${c.color};">
      ${c.emoji}
    </div>
    <div class="card-body">
      <div class="card-spirit">${spiritLabel}</div>
      <div class="card-name">${c.name}</div>
      <div class="card-desc">${c.desc}</div>
      <div class="card-tags">${tagsHtml}</div>
    </div>
  `;

        // 애니메이션 재실행
        const card = document.getElementById('cocktail-card');
        card.style.animation = 'none';
        card.offsetHeight; // reflow
        card.style.animation = '';
      }

      function answer(val) {
        const c = queue[current];
        if (val !== 'skip') answers[c.id] = val;

        history.push({ idx: current, answerId: c.id, val });
        current++;

        if (current >= queue.length) {
          showResult();
        } else {
          renderCard();
        }

        if (history.length === 0) return;

        delete answers[last.answerId];
        current = last.idx;

      function calcKeywordScores() {
        const scores = {};
        for (const [id, val] of Object.entries(answers)) {
          const c = COCKTAILS.find((x) => x.id === id);
          if (!c) continue;
          const weight = val === 'like' ? 2 : val === 'meh' ? 1 : -1;

            scores[lbl] = (scores[lbl] || 0) + weight;
          });
        }
        return scores;
      }

          if (!c) continue;
          c.scores.forEach((lbl) => {
            counts[lbl] = (counts[lbl] || 0) + 1;

        }
        return counts;

        const best = profiles.reduce((a, b) => (b.score > a.score ? b : a));

        if (best.score <= 0) {

      }

      /* all-skip 시 하드코딩 top6 추천 */
      const DEFAULT_RECS = [
        { id: 'mojito', reason: '입문용으로 가장 대중적인 클래식' },
        { id: 'margarita', reason: '세계에서 가장 많이 팔리는 칵테일' },
        { id: 'pina-colada', reason: '트로피컬의 대명사, 호불호 없는 달콤함' },
        { id: 'old-fashioned', reason: '위스키 베이스의 클래식 중 클래식' },
        { id: 'cosmopolitan', reason: '새콤달콤한 균형의 대표 인기작' },
        {
          id: 'sex-on-beach',

        },
      ];

      /* 추천 칵테일 (응답한 것 제외 + REC_POOL 포함, 상위 키워드 기반) */
      function getRecommendations(scores) {
        // all-skip: scores가 비어있으면 하드코딩 top6 반환
        if (Object.keys(scores).length === 0) {
          return DEFAULT_RECS.map(({ id, reason }) => ({
            c: COCKTAILS.find((c) => c.id === id),
            reason,
          }));
        }

        const answeredIds = new Set(Object.keys(answers));
        const topKws = Object.entries(scores)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 4)
          .map((x) => x[0]);

        // 퀴즈 미출제 칵테일(skip 포함) + REC_POOL 전체 후보
        const quizCandidates = COCKTAILS.filter(
          (c) => !answeredIds.has(c.id) || answers[c.id] === 'skip',
        );
        const poolCandidates = REC_POOL.map((c) => ({
          ...c,
          tags: [],
          isPool: true,
        }));
        const candidates = [...quizCandidates, ...poolCandidates];

        const scored = candidates
          .map((c) => {
            let s = 0;
            (c.scores || c.labels || []).forEach((lbl) => {
              if (topKws.includes(lbl)) s++;
            });
            return { c, s };
          })
          .sort((a, b) => b.s - a.s)
          .slice(0, 6);

        if (scored.length === 0) {
          return COCKTAILS.filter((c) => answers[c.id] === 'like')
            .slice(0, 6)
            .map((c) => ({
              c,
              reason: '이미 좋아하는 칵테일과 비슷한 구조',
            }));
        }

        return scored.map(({ c }) => {
          const matchKws = (c.scores || c.labels || []).filter((l) =>
            topKws.includes(l),
          );
          return {
            c,
            reason:
              matchKws.length > 0
                ? `<strong>${matchKws.map(toDisplay).join(' · ')}</strong> 취향과 매칭`
                : '취향 프로필 기반 추천',
          };
        });
      }

      /* ════════════════════════════════════════
   RADAR CHART HELPERS
════════════════════════════════════════ */

      /* SVG 정육각형 좌표 계산 */
      function hexPoint(cx, cy, r, i, n) {
        const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
        return [cx + r * Math.cos(angle), cy + r * Math.sin(angle)];
      }

      function makeRadar({ cx, cy, r, labels, values, color, labelColor }) {
        const n = labels.length;
        const levels = 4;

        // 격자선
        let gridLines = '';
        for (let l = 1; l <= levels; l++) {
          const pts = Array.from({ length: n }, (_, i) =>
            hexPoint(cx, cy, (r * l) / levels, i, n),
          );
          gridLines += `<polygon points="${pts.map((p) => p.join(',')).join(' ')}"
      fill="none" stroke="#2e2438" stroke-width="1"/>`;
        }

        // 축선
        let axes = '';
        for (let i = 0; i < n; i++) {
          const [x, y] = hexPoint(cx, cy, r, i, n);
          axes += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}"
      stroke="#2e2438" stroke-width="1"/>`;
        }

        // 데이터 폴리곤
        const pts = values.map((v, i) =>
          hexPoint(cx, cy, r * Math.max(0, Math.min(1, v)), i, n),
        );
        const polyPts = pts.map((p) => p.join(',')).join(' ');

        // 라벨
        let labelsSvg = '';
        for (let i = 0; i < n; i++) {
          const pad = 22;
          const [lx, ly] = hexPoint(cx, cy, r + pad, i, n);
          const anchor = lx < cx - 4 ? 'end' : lx > cx + 4 ? 'start' : 'middle';
          labelsSvg += `<text x="${lx}" y="${ly}" text-anchor="${anchor}"
      dominant-baseline="middle"
      font-size="10" fill="${labelColor || '#7b7485'}"
      font-family="Noto Sans KR, sans-serif">${labels[i]}</text>`;
        }

        // 꼭짓점 점
        const dots = pts
          .map(
            ([x, y]) =>
              `<circle cx="${x}" cy="${y}" r="3" fill="${color}" opacity=".9"/>`,
          )
          .join('');

        return `
    ${gridLines}
    ${axes}
    <polygon points="${polyPts}"
      fill="${color}" fill-opacity=".18"
      stroke="${color}" stroke-width="1.5"
      class="radar-fill"/>
    ${dots}
    ${labelsSvg}
  `;
      }

      /* 취향 6각형: 6축으로 키워드 점수 매핑 */
      function calcTasteRadar(scores) {
        // 카드 수 기반 정규화: 해당 키워드 달린 카드 수 × 2(좋아 가중치)
        // cardCounts는 전역 COCKTAIL_CARD_COUNTS 캐시 사용
        const norm = (keys) => {
          const vals = keys.map((k) => Math.max(0, scores[k] || 0));
          const sum = vals.reduce((a, b) => a + b, 0);
          const maxPossible = keys.reduce(
            (acc, k) => acc + (COCKTAIL_CARD_COUNTS[k] || 1) * 2,
            0,
          );
          return Math.min(1, sum / maxPossible);
        };
        return [
          norm(['산미']), // 산미
          norm(['시트러스']), // 시트러스
          norm(['단맛', '과일']), // 달콤·과일
          norm(['향신료', '허브', '너티']), // 복합향
          norm(['쓴맛', '드라이']), // 쓴맛·드라이
          norm(['탄산']), // 스파클링
        ];
      }

      /* 스피릿 6각형: 좋아=+2, 무난=+1, 별로=-1, skip 제외 */
      function calcSpiritRadar() {
        const spirits = ['위스키', '진', '보드카', '럼', '데킬라', '브랜디'];
        return spirits.map((sp) => {
          const group = COCKTAILS.filter((c) => c.spirit === sp);
          let total = 0,
            count = 0;
          group.forEach((c) => {
            const v = answers[c.id];
            if (v === 'like') {
              total += 2;
              count++;
            } else if (v === 'meh') {
              total += 1;
              count++;
            } else if (v === 'no') {
              total += -1;
              count++;
            }
          });
          if (count === 0) return 0;
          // 정규화: 최소(-1*count) ~ 최대(+2*count) → 0~1
          const min = -1 * count;
          const max = 2 * count;
          return (total - min) / (max - min);
        });
      }
      function buildRadarSVG(labels, values, color, size) {
        const cx = size / 2,
          cy = size / 2;
        const r = size * 0.33;
        const inner = makeRadar({
          cx,
          cy,
          r,
          labels,
          values,
          color,
          labelColor: '#8b90a8',
        });
        return `<svg class="radar-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${inner}</svg>`;
      }

      </div>`;
          })

        const dislikedBarsHtml = dislikedKeywords
          .map(([key]) => {
            const pct = dislikePct(key);
            const cnt = counts[key] || 0;
            return `
      <div class="ks-row">

          )

        document.getElementById('screen-result').innerHTML = `

      function restartQuiz() {

      function encodeResult() {

        const data = { n: nickname, a: {} };
        for (const [id, val] of Object.entries(answers)) {
          if (val !== 'skip') data.a[id] = val[0]; // 'like'→'l', 'meh'→'m', 'no'→'n'
        }
        return btoa(encodeURIComponent(JSON.stringify(data)));
      }

      function decodeResult(encoded) {
        try {
          const data = JSON.parse(decodeURIComponent(atob(encoded)));
          const decoded = { nickname: data.n, answers: {} };
          for (const [id, v] of Object.entries(data.a)) {
            decoded.answers[id] = v === 'l' ? 'like' : v === 'm' ? 'meh' : 'no';
          }
          return decoded;
        } catch {
          return null;
        }
      }

      /* ── 링크 공유 ── */
      function shareLink() {
        const encoded = encodeResult();
        const url = `https://hyexjun.github.io/cocktail-taste?r=${encoded}`;
        if (navigator.share) {
          navigator.share({
            title: `${nickname}의 칵테일 취향`,
            text: '나의 칵테일 취향 결과 보러 오기 🍸',
            url,
          });
        } else {
          navigator.clipboard.writeText(url).then(() => {
            const btn = document.querySelector('.btn-share');
            const orig = btn.textContent;
            btn.textContent = '✅ 링크 복사됨!';
            setTimeout(() => (btn.textContent = orig), 2000);
          });
        }
      }

      /* ════════════════════════════════════════
   UTIL
════════════════════════════════════════ */
      const DISPLAY = {
        'screen-intro': 'flex',
        'screen-quiz': 'flex',
        'screen-result': 'block',
      };
      /* ── 터치 스크롤 차단 ── */
      function preventTouch(e) {
        e.preventDefault();
      }

      function show(id) {
        ['screen-intro', 'screen-quiz', 'screen-result'].forEach((s) => {
          document.getElementById(s).style.display =
            s === id ? DISPLAY[s] : 'none';
        });
        const lockScroll = id === 'screen-quiz' || id === 'screen-intro';
        document.body.style.overflow = lockScroll ? 'hidden' : '';
        document.documentElement.style.overflow = lockScroll ? 'hidden' : '';
        if (lockScroll) {
          document.addEventListener('touchmove', preventTouch, {
            passive: false,
          });
        } else {
          document.removeEventListener('touchmove', preventTouch);
        }
        window.scrollTo(0, 0);
      }

      /* ── 공유 링크로 들어왔을 때 결과 뷰 ── */
      function showSharedResult(decoded) {
        answers = decoded.answers;
        nickname = decoded.nickname;
        showResult(true);
      }

      /* ── 페이지 로드 시 URL 체크 ── */
      (function init() {
        const params = new URLSearchParams(location.search);
        const r = params.get('r');
        if (r) {
          const decoded = decodeResult(r);
          if (decoded) {
            showSharedResult(decoded);
            return;
          }
        }
        show('screen-intro');
      })();

      /* ════════════════════════════════════════
   FIREBASE 연동 메모 (배포 시 참고)
   ────────────────────────────────────────
   1. firebase init → hosting + firestore
   2. 결과 저장:
      import { getFirestore, collection, addDoc } from 'firebase/firestore';
      const db = getFirestore(app);
      await addDoc(collection(db, 'results'), {
        answers,        // { cocktailId: 'like'|'meh'|'no' }
        scores,         // 키워드 점수
        profileType,    // 취향 유형 이름
        timestamp: serverTimestamp(),
        userId: sessionId // 익명 식별자 (optional)
      });
   3. 집계 대시보드: 칵테일별 like/meh/no 비율 실시간 집계
════════════════════════════════════════ */
    </script>
  </body>
</html>
