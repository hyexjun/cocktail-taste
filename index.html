<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>칵테일 취향 찾기</title>
<meta name="description" content="대표 칵테일 42종에 반응하고 나의 취향 유형과 맞춤 추천을 받아보세요.">
<meta property="og:title" content="🍸 나의 칵테일 취향 찾기">
<meta property="og:description" content="42종 칵테일에 반응하면 취향 레이더와 맞춤 추천까지. 나는 어떤 칵테일파일까?">
<meta property="og:type" content="website">
<meta property="og:url" content="https://hyexjun.github.io/cocktail-taste">
<meta property="og:image" content="https://hyexjun.github.io/cocktail-taste/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="🍸 나의 칵테일 취향 찾기">
<meta name="twitter:description" content="42종 칵테일에 반응하면 취향 레이더와 맞춤 추천까지.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

:root {
  --bg:       #0f0c10;
  --surface:  #1a1520;
  --surface2: #221c2a;
  --border:   #2e2438;
  --amber:    #c9942a;
  --amber-lt: #e8b84b;
  --rose:     #c45c72;
  --sage:     #7aaa8a;
  --slate:    #8b90a8;
  --txt:      #ede8f0;
  --muted:    #7b7485;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--txt);
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── 공통 유틸 ── */
.hidden { display: none !important; }

/* ══════════════════════════════
   SCREEN 1: INTRO
══════════════════════════════ */
#screen-intro {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  text-align: center;
}
.intro-glow {
  width: 120px; height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201,148,42,.25) 0%, transparent 70%);
  display: flex; align-items: center; justify-content: center;
  font-size: 52px;
  margin-bottom: 32px;
}
#screen-intro h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(26px, 5vw, 38px);
  font-weight: 400;
  line-height: 1.3;
  margin-bottom: 14px;
}
#screen-intro h1 em { font-style: italic; color: var(--amber-lt); }
#screen-intro p {
  font-size: 14px; color: var(--muted);
  max-width: 340px; line-height: 1.8; margin-bottom: 36px;
}
.btn-start {
  padding: 14px 36px;
  background: linear-gradient(135deg, #4a3820, #2e2010);
  border: 1px solid var(--amber);
  border-radius: 100px;
  color: var(--amber-lt);
  font-size: 15px; font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  transition: opacity .2s;
}
.btn-start:hover { opacity: .8; }
.btn-start:disabled { opacity: .35; cursor: default; }

/* 닉네임 입력 */
.nickname-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  margin-bottom: 24px;
  width: 100%;
  max-width: 280px;
}
.nickname-input {
  width: 100%;
  padding: 12px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  color: var(--txt);
  font-size: 15px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 400;
  text-align: center;
  outline: none;
  transition: border-color .2s;
}
.nickname-input::placeholder { color: var(--muted); }
.nickname-input:focus { border-color: var(--amber); }
.nickname-hint {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .05em;
}

/* 공유 결과 배너 */
.shared-banner {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--amber);
  border-radius: 12px;
  padding: 18px 20px;
  text-align: center;
  margin-bottom: 0;
}
.shared-banner .sb-label {
  font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
  color: var(--amber); margin-bottom: 8px;
}
.shared-banner .sb-name {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 600; margin-bottom: 14px;
}
.shared-banner .sb-name em { font-style: italic; color: var(--amber-lt); }
.btn-try {
  padding: 10px 28px;
  background: linear-gradient(135deg, #4a3820, #2e2010);
  border: 1px solid var(--amber);
  border-radius: 100px;
  color: var(--amber-lt);
  font-size: 13px; font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  transition: opacity .2s;
}
.btn-try:hover { opacity: .8; }

/* ══════════════════════════════
   SCREEN 2: QUIZ
══════════════════════════════ */
#screen-quiz {
  display: flex;
  flex-direction: column;
  max-width: 540px;
  margin: 0 auto;
  width: 100%;
  padding: 0 20px 0;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  touch-action: none;
  overscroll-behavior: none;
}

#screen-intro {
  touch-action: none;
  overscroll-behavior: none;
}

/* 상단 바 */
.quiz-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0 12px;
  gap: 12px;
  flex-shrink: 0;
}
.progress-wrap { flex: 1; }
.progress-label {
  font-size: 11px; color: var(--muted);
  letter-spacing: .1em; margin-bottom: 6px;
}
.progress-bar-bg {
  height: 3px; background: var(--surface2); border-radius: 100px;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--amber), var(--amber-lt));
  border-radius: 100px;
  transition: width .4s ease;
}
.btn-back {
  background: none; border: 1px solid var(--border);
  border-radius: 8px; color: var(--muted);
  font-size: 12px; padding: 6px 12px;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; white-space: nowrap;
  transition: border-color .15s, color .15s;
}
.btn-back:hover { border-color: var(--muted); color: var(--txt); }
.btn-back:disabled { opacity: .3; cursor: default; }

/* 카드 */
.card-area {
  flex: 1;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.card-btn-wrap {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.cocktail-card {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  animation: cardIn .3s ease;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px) scale(.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.card-visual {
  height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
  position: relative;
  overflow: hidden;
}
.card-visual::before {
  content: '';
  position: absolute; inset: 0;
  opacity: .55;
}
.card-body { padding: 16px 20px 18px; }
.card-spirit {
  font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
  color: var(--amber); margin-bottom: 6px;
}
.card-name {
  font-family: 'Playfair Display', serif;
  font-size: 24px; font-weight: 600; margin-bottom: 8px;
}
.card-desc {
  font-size: 13px; color: var(--muted);
  line-height: 1.7; margin-bottom: 12px;
}
.card-tags {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.ctag {
  font-size: 11px; padding: 3px 10px;
  border-radius: 100px; border: 1px solid;
}
.ctag-herb   { background: rgba(122,170,138,.12); color: var(--sage);     border-color: rgba(122,170,138,.25); }
.ctag-spice  { background: rgba(201,148,42,.12);  color: var(--amber-lt); border-color: rgba(201,148,42,.25); }
.ctag-citrus { background: rgba(232,184,75,.12);  color: #d4b86a;         border-color: rgba(232,184,75,.25); }
.ctag-sweet  { background: rgba(196,92,114,.12);  color: var(--rose);     border-color: rgba(196,92,114,.25); }
.ctag-dry    { background: rgba(139,144,168,.12); color: var(--slate);    border-color: rgba(139,144,168,.25); }
.ctag-fruity { background: rgba(180,130,200,.12); color: #c0a0e0;         border-color: rgba(180,130,200,.25); }
.ctag-sour   { background: rgba(180,200,100,.12); color: #b0c870;         border-color: rgba(180,200,100,.25); }
.ctag-nutty  { background: rgba(160,120,80,.12);  color: #c0946a;         border-color: rgba(160,120,80,.25); }
.ctag-savory { background: rgba(100,160,120,.12); color: #80c090;         border-color: rgba(100,160,120,.25); }
.ctag-bitter { background: rgba(80,80,120,.12);   color: #9090c0;         border-color: rgba(80,80,120,.25); }
.ctag-tropical{ background: rgba(220,180,80,.12); color: #d4b050;         border-color: rgba(220,180,80,.25); }
.ctag-fizzy  { background: rgba(140,180,220,.12); color: #90b8d8;         border-color: rgba(140,180,220,.25); }

/* 버튼 그룹 */
.action-buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  flex-shrink: 0;
  padding-bottom: 20px;
}
.act-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  padding: 12px 6px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 11px;
  cursor: pointer;
  transition: all .15s;
}
.act-btn .act-icon { font-size: 20px; line-height: 1; }
.act-btn:hover { border-color: var(--muted); color: var(--txt); }

.act-btn.no     { --c: var(--rose); }
.act-btn.meh    { --c: var(--slate); }
.act-btn.like   { --c: var(--amber-lt); }
.act-btn.skip   { --c: var(--muted); }

.act-btn.no:hover   { border-color: var(--rose);     color: var(--rose);     background: rgba(196,92,114,.08); }
.act-btn.meh:hover  { border-color: var(--slate);    color: var(--slate);    background: rgba(139,144,168,.08); }
.act-btn.like:hover { border-color: var(--amber-lt); color: var(--amber-lt); background: rgba(232,184,75,.08); }

/* ══════════════════════════════
   SCREEN 3: RESULT
══════════════════════════════ */
#screen-result {
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
  padding: 32px 28px 80px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.result-hero {
  text-align: center;
  padding: 24px 0 36px;
}
.result-badge {
  display: inline-flex;
  align-items: center; justify-content: center;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201,148,42,.2) 0%, transparent 70%);
  border: 1px solid var(--border);
  font-size: 36px;
  margin-bottom: 20px;
}
.result-type-label {
  font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
  color: var(--amber); margin-bottom: 10px;
}
.result-type-name {
  font-family: 'Playfair Display', serif;
  font-size: clamp(22px, 4vw, 30px);
  font-weight: 600; margin-bottom: 14px;
  line-height: 1.4;
}
.result-type-name em { font-style: italic; color: var(--amber-lt); }
.result-type-desc {
  font-size: 14px; color: var(--muted); line-height: 1.9;
  max-width: 420px; margin: 0 auto;
}

/* 섹션 타이틀 */
.sec-title {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 20px;
}
.sec-title .sec-icon { font-size: 16px; }
.sec-title h2 {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 600;
  white-space: nowrap;
}
.sec-title .rule { flex: 1; height: 1px; background: var(--border); }

#screen-result section {
  padding: 36px 0 36px;
  border-top: 1px solid var(--border);
}

/* 레이더 세로 쌓기 */
.radar-row {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}

/* 키워드 스코어 */
.keyword-scores {
  display: flex; flex-direction: column; gap: 12px;
}
.ks-row {
  display: flex; align-items: center; gap: 12px;
}
.ks-label {
  width: 90px; font-size: 12px; color: var(--muted); flex-shrink: 0;
}
.ks-bar-bg {
  flex: 1; height: 6px;
  background: var(--surface2); border-radius: 100px; overflow: hidden;
}
.ks-bar-fill {
  height: 100%; border-radius: 100px;
  transition: width 1s cubic-bezier(.4,0,.2,1);
}
.ks-score {
  width: 32px; text-align: right;
  font-size: 12px; color: var(--muted); flex-shrink: 0;
}

/* 추천 카드 */
.rec-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}
.rec-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  transition: border-color .15s;
}
.rec-card:hover { border-color: var(--amber); }
.rec-card .rec-emoji { font-size: 28px; margin-bottom: 10px; }
.rec-card .rec-name {
  font-size: 14px; font-weight: 700; margin-bottom: 6px;
}
.rec-card .rec-reason {
  font-size: 12px; color: var(--muted); line-height: 1.7;
}
.rec-card .rec-reason strong { color: var(--amber-lt); font-weight: 500; }

/* 리뷰 테이블 */
.review-table {
  display: flex; flex-direction: column; gap: 4px;
}
.review-row {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  background: var(--surface);
  border-radius: 8px;
  font-size: 13px;
}
.review-row .rr-name { font-weight: 500; line-height: 1.4; }
.review-row .rr-note { font-size: 11px; color: var(--muted); margin-top: 2px; }
.rtag-like { color: var(--amber-lt); font-size: 11px; white-space: nowrap; }
.rtag-meh  { color: var(--slate);    font-size: 11px; white-space: nowrap; }
.rtag-no   { color: var(--rose);     font-size: 11px; white-space: nowrap; }

/* 다시하기 */
.restart-wrap {
  text-align: center;
  padding: 36px 0 0;
  border-top: 1px solid var(--border);
}
.btn-restart {
  padding: 12px 32px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  color: var(--muted);
  font-size: 13px; font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  transition: all .2s;
}
.btn-restart:hover { border-color: var(--amber); color: var(--amber-lt); }

/* ── 레이더 차트 ── */
.radar-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 16px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.radar-block-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
}
.radar-svg { overflow: visible; }

/* 폴리곤 그리기 애니메이션 */
@keyframes radarIn {
  from { opacity: 0; transform: scale(.85); }
  to   { opacity: 1; transform: scale(1); }
}
.radar-fill { animation: radarIn .6s cubic-bezier(.4,0,.2,1) both; }

/* ── 저장·공유 버튼 ── */
.action-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-bottom: 10px;
  flex-wrap: nowrap;
}
.btn-action {
  padding: 10px 16px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--txt);
  font-size: 13px;
  font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn-save:hover  { border-color: var(--amber); color: var(--amber-lt); }
.btn-share:hover { border-color: var(--sage);  color: var(--sage); }
.btn-restart-sm {
  padding: 10px 16px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-size: 13px; font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all .2s;
}
.btn-restart-sm:hover { border-color: var(--amber); color: var(--amber-lt); }

/* ── 반응형 ── */
@media (max-width: 480px) {
  .action-buttons { grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .act-btn { padding: 10px 4px; font-size: 10px; }
  .act-btn .act-icon { font-size: 18px; }
  .rec-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- ══ SCREEN 1: INTRO ══ -->
<div id="screen-intro">
  <div class="intro-glow">🍸</div>
  <h1>나의 칵테일<br><em>취향 찾기</em></h1>
  <p>대표 칵테일 42종에 반응해보세요.<br>취향을 분석해 딱 맞는 칵테일을 추천해드립니다.</p>
  <div class="nickname-wrap">
    <input
      id="nickname-input"
      class="nickname-input"
      type="text"
      placeholder="닉네임을 입력하세요"
      maxlength="12"
      oninput="onNicknameInput()"
      onkeydown="if(event.key==='Enter') tryStart()"
    />
    <div class="nickname-hint">결과 공유 시 표시됩니다</div>
  </div>
  <button class="btn-start" id="btn-start" onclick="tryStart()" disabled>시작하기</button>
</div>

<!-- ══ SCREEN 2: QUIZ ══ -->
<div id="screen-quiz" style="display:none;">
  <div class="quiz-header">
    <div class="progress-wrap">
      <div class="progress-label" id="progress-label">0 / 28</div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
      </div>
    </div>
    <button class="btn-back" id="btn-back" onclick="goBack()" disabled>← 뒤로</button>
  </div>

  <div class="card-area">
    <div class="card-btn-wrap">
      <div class="cocktail-card" id="cocktail-card">
        <!-- JS로 렌더링 -->
      </div>
      <div class="action-buttons">
        <button class="act-btn no"   onclick="answer('no')">
          <span class="act-icon">👎</span>별로
        </button>
        <button class="act-btn meh"  onclick="answer('meh')">
          <span class="act-icon">😐</span>무난
        </button>
        <button class="act-btn like" onclick="answer('like')">
          <span class="act-icon">👍</span>좋아
        </button>
        <button class="act-btn skip" onclick="answer('skip')">
          <span class="act-icon">⏭</span>모름
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ══ SCREEN 3: RESULT ══ -->
<div id="screen-result" style="display:none;">
  <!-- JS로 렌더링 -->
</div>

<script>
/* ════════════════════════════════════════
   DATA: 칵테일 42종 (스피릿별 순서 고정, 각 7종)
   tags: 취향 분석에 사용되는 향/맛 키워드
   ※ Firebase 배포 시 이 데이터를 Firestore에 저장하고
     results 컬렉션에 {userId, answers, timestamp} 저장하면 됨
════════════════════════════════════════ */
const COCKTAILS = [
  // ── 위스키 (7) ──
  { id:'old-fashioned', spirit:'위스키', name:'올드 패션드',       emoji:'🥃',

════════════════════════════════════════ */
let queue = [];           // 출제 순서
let current = 0;          // 현재 인덱스
let answers = {};         // { cocktailId: 'like'|'meh'|'no'|'skip' }
let history = [];         // 뒤로가기용 스택
let nickname = '';        // 사용자 닉네임

/* 닉네임 입력 핸들러 */
function onNicknameInput() {
  const val = document.getElementById('nickname-input').value.trim();
  document.getElementById('btn-start').disabled = val.length === 0;
}

function tryStart() {
  const val = document.getElementById('nickname-input').value.trim();
  if (!val) return;
  nickname = val;
  startQuiz();
}

/* ════════════════════════════════════════
   QUIZ LOGIC
════════════════════════════════════════ */
function startQuiz() {
  queue = [...COCKTAILS];
  current = 0;
  answers = {};
  history = [];
  show('screen-quiz');
  renderCard();
}

function renderCard() {
  const c = queue[current];
  const total = queue.length;

  document.getElementById('progress-label').textContent = `${current + 1} / ${total}`;
  document.getElementById('progress-bar').style.width = `${((current + 1) / total) * 100}%`;
  document.getElementById('btn-back').disabled = history.length === 0;

  const tagsHtml = c.tags.map((cls, i) =>
    `<span class="ctag ${cls}">${c.labels[i]}</span>`
  ).join('');

  document.getElementById('cocktail-card').innerHTML = `
    <div class="card-visual" style="background:${c.color};">
      ${c.emoji}
    </div>
    <div class="card-body">
      <div class="card-spirit">${c.spirit}</div>
      <div class="card-name">${c.name}</div>
      <div class="card-desc">${c.desc}</div>
      <div class="card-tags">${tagsHtml}</div>
    </div>
  `;

  // 애니메이션 재실행
  const card = document.getElementById('cocktail-card');
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = '';
}

function answer(val) {
  const c = queue[current];
  if (val !== 'skip') answers[c.id] = val;

  history.push({ idx: current, answerId: c.id, val });
  current++;

  if (current >= queue.length) {
    showResult();
  } else {
    renderCard();
  }
}

function goBack() {
  if (history.length === 0) return;
  const last = history.pop();
  delete answers[last.answerId];
  current = last.idx;
  renderCard();
}

function calcKeywordScores() {
  const scores = {};
  for (const [id, val] of Object.entries(answers)) {
    const c = COCKTAILS.find(x => x.id === id);
    if (!c) continue;
    const weight = val === 'like' ? 2 : val === 'meh' ? 0.5 : -1;
    c.labels.forEach(lbl => {
      scores[lbl] = (scores[lbl] || 0) + weight;
    });
  }
  return scores;
}

/* 취향 유형 판정 */
function getProfile(scores) {
  const top = Object.entries(scores).sort((a,b) => b[1]-a[1]).slice(0,3).map(x=>x[0]);
  const liked = COCKTAILS.filter(c => answers[c.id] === 'like');

  if (top.includes('허브') && top.includes('향신료'))
    return { emoji:'🌿', name:'<em>허브·향신료</em> 탐험가', desc:'복합적인 향에서 즐거움을 찾는 타입. 한 가지 맛으로 설명되지 않는, 마실수록 달라지는 칵테일을 좋아합니다.' };
  if (top.includes('산미') && top.includes('시트러스'))
    return { emoji:'🍋', name:'<em>새콤한 산미</em> 추구형', desc:'레몬·라임이 이끄는 새콤한 구조를 선호합니다. 단맛보다 산미로 마무리되는 칵테일이 취향.' };
  if (top.includes('드라이') && top.includes('비터'))
    return { emoji:'🥃', name:'<em>드라이·비터</em> 정통파', desc:'단맛 없이 씁쓸하고 드라이한 정통 클래식을 즐기는 타입. 칵테일 바에서 바텐더에게 신뢰받는 주문 스타일.' };
  if (top.includes('과일') && top.includes('트로피컬'))
    return { emoji:'🍍', name:'<em>트로피컬·과일</em> 러버', desc:'밝고 화사한 과일향을 사랑하는 타입. 여름 바닷가가 생각나는 화려한 색감의 칵테일이 딱.' };
  if (top.includes('단맛'))
    return { emoji:'🍬', name:'<em>달콤한 향</em> 선호형', desc:'단맛이 중심이 되는 칵테일을 편안하게 즐기는 타입. 너무 강하지 않고 부드럽게 마무리되는 음료를 선호.' };
  if (top.includes('탄산') && top.includes('시트러스'))
    return { emoji:'🫧', name:'<em>가볍고 상쾌한</em> 롱드링크파', desc:'탄산과 시트러스의 조합을 가장 편하게 느끼는 타입. 부담 없이 즐기는 롱드링크가 딱 맞습니다.' };
  if (top.includes('세이보리') || top.includes('비터'))
    return { emoji:'🍅', name:'<em>개성파</em> 세이보리·비터', desc:'달지 않고 복잡한 풍미를 즐기는 개성 있는 타입. 일반적이지 않은 칵테일에서 즐거움을 찾습니다.' };
  return { emoji:'🍸', name:'<em>열린 입맛</em>의 탐험가', desc:'특정 취향보다 다양한 칵테일을 고루 즐기는 타입. 어떤 칵테일을 마셔도 나름의 즐거움을 찾을 수 있습니다.' };
}

/* 추천 칵테일 (응답한 것 제외, 상위 키워드 기반) */
function getRecommendations(scores) {
  const answeredIds = new Set(Object.keys(answers));
  const topKws = Object.entries(scores).sort((a,b) => b[1]-a[1]).slice(0,4).map(x=>x[0]);

  // 아직 안 마셔봤거나 skip한 칵테일 중 추천
  const candidates = COCKTAILS.filter(c => !answeredIds.has(c.id) || answers[c.id] === 'skip');

  const scored = candidates.map(c => {
    let s = 0;
    c.labels.forEach(lbl => { if (topKws.includes(lbl)) s++; });
    return { c, s };
  }).sort((a,b) => b.s-a.s).slice(0,4);

  // 그래도 없으면 전체 liked 기반
  if (scored.length === 0) {
    return COCKTAILS.filter(c => answers[c.id] === 'like').slice(0,4).map(c => ({
      c, reason: '이미 좋아하는 칵테일과 비슷한 구조'
    }));
  }

  return scored.map(({c}) => {
    const matchKws = c.labels.filter(l => topKws.includes(l));
    return { c, reason: matchKws.length > 0 ? `<strong>${matchKws.join(' · ')}</strong> 취향과 매칭` : '취향 프로필 기반 추천' };
  });
}

/* SVG 정육각형 좌표 계산 */
function hexPoint(cx, cy, r, i, n) {
  const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
  return [cx + r * Math.cos(angle), cy + r * Math.sin(angle)];
}

function makeRadar({ cx, cy, r, labels, values, color, labelColor }) {
  const n = labels.length;
  const levels = 4;

  // 격자선
  let gridLines = '';
  for (let l = 1; l <= levels; l++) {
    const pts = Array.from({length: n}, (_, i) => hexPoint(cx, cy, r * l / levels, i, n));
    gridLines += `<polygon points="${pts.map(p=>p.join(',')).join(' ')}"
      fill="none" stroke="#2e2438" stroke-width="1"/>`;
  }

  // 축선
  let axes = '';
  for (let i = 0; i < n; i++) {
    const [x, y] = hexPoint(cx, cy, r, i, n);
    axes += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}"
      stroke="#2e2438" stroke-width="1"/>`;
  }

  // 데이터 폴리곤
  const pts = values.map((v, i) => hexPoint(cx, cy, r * Math.max(0, Math.min(1, v)), i, n));
  const polyPts = pts.map(p => p.join(',')).join(' ');

  // 라벨
  let labelsSvg = '';
  for (let i = 0; i < n; i++) {
    const pad = 22;
    const [lx, ly] = hexPoint(cx, cy, r + pad, i, n);
    const anchor = lx < cx - 4 ? 'end' : lx > cx + 4 ? 'start' : 'middle';
    labelsSvg += `<text x="${lx}" y="${ly}" text-anchor="${anchor}"
      dominant-baseline="middle"
      font-size="10" fill="${labelColor || '#7b7485'}"
      font-family="Noto Sans KR, sans-serif">${labels[i]}</text>`;
  }

  // 꼭짓점 점
  const dots = pts.map(([x,y]) =>
    `<circle cx="${x}" cy="${y}" r="3" fill="${color}" opacity=".9"/>`
  ).join('');

  return `
    ${gridLines}
    ${axes}
    <polygon points="${polyPts}"
      fill="${color}" fill-opacity=".18"
      stroke="${color}" stroke-width="1.5"
      class="radar-fill"/>
    ${dots}
    ${labelsSvg}
  `;
}

/* 취향 6각형: 6축으로 키워드 점수 매핑 */
function calcTasteRadar(scores) {
  const norm = (keys) => {
    const vals = keys.map(k => Math.max(0, scores[k] || 0));
    const sum = vals.reduce((a,b) => a+b, 0);
    const maxPossible = keys.length * 4;
    return Math.min(1, sum / maxPossible);
  };
  return [
    norm(['허브','향신료','세이보리']),  // 향·복합
    norm(['단맛','트로피컬','과일']),     // 단맛·과일
    norm(['산미','시트러스']),            // 산미
    norm(['비터','드라이']),              // 쓴맛·드라이
    norm(['견과류']),                    // 바디·무게감
    norm(['탄산','시트러스']),           // 청량감
  ];
}

/* 스피릿 6각형: 각 스피릿 칵테일들의 가중 평균 */
function calcSpiritRadar() {
  const spirits = ['위스키','진','보드카','럼','데킬라','리큐르'];
  return spirits.map(sp => {
    const group = COCKTAILS.filter(c => c.spirit === sp);
    let total = 0, count = 0;
    group.forEach(c => {
      const v = answers[c.id];
      if (v === 'like') { total += 1; count++; }
      else if (v === 'meh') { total += 0.5; count++; }
      else if (v === 'no') { total += 0; count++; }
    });
    return count === 0 ? 0 : total / count;
  });
}

function buildRadarSVG(labels, values, color, size) {
  const cx = size / 2, cy = size / 2;
  const r = size * 0.33;
  const inner = makeRadar({ cx, cy, r, labels, values, color, labelColor: '#8b90a8' });
  return `<svg class="radar-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${inner}</svg>`;
}


function showResult(isShared = false) {
  const scores = calcKeywordScores();
  const profile = getProfile(scores);
  const recs = getRecommendations(scores);

  // 키워드 정규화 (0~100)
  const vals = Object.values(scores);
  const maxVal = Math.max(...vals, 1);
  const minVal = Math.min(...vals, 0);
  const normPct = key => {
    const v = scores[key] || 0;
    return Math.round(Math.max(0, (v - minVal) / (maxVal - minVal + 0.01)) * 100);
  };

  // 리뷰 테이블
  const liked = COCKTAILS.filter(c => answers[c.id] === 'like');
  const mehs  = COCKTAILS.filter(c => answers[c.id] === 'meh');

    ...liked.map(c => `<div class="review-row"><div><div class="rr-name">${c.name}</div><div class="rr-note">${c.spirit}</div></div><span class="rtag-like">👍 좋아함</span></div>`),
    ...mehs.map(c  => `<div class="review-row"><div><div class="rr-name">${c.name}</div><div class="rr-note">${c.spirit}</div></div><span class="rtag-meh">😐 무난</span></div>`),

  ].join('');

  // 키워드 바

    .filter(([,v]) => v > 0)
    .slice(0,8);

      <div class="ks-row">

  // 추천 카드

  // ── 레이더 차트 ──

  const spiritVals   = calcSpiritRadar();
  const spiritLabels = ['위스키', '진', '보드카', '럼', '데킬라', '리큐르'];
  const spiritSVG    = buildRadarSVG(spiritLabels, spiritVals, '#7aaa8a', 220);

  document.getElementById('screen-result').innerHTML = `
    ${isShared ? `
    <div class="shared-banner">
      <div class="sb-label">칵테일 취향 결과 공유</div>
      <div class="sb-name"><em>${nickname}</em>님의 취향 분석 결과</div>
      <button class="btn-try" onclick="restartQuiz()">🍸 나도 해보기</button>
    </div>` : ''}

    <div class="result-hero">
      <div class="result-badge">${profile.emoji}</div>
      <div class="result-type-label">나의 칵테일 취향 유형</div>

        <div class="rule"></div>
      </div>
      <div class="radar-row">
        <div class="radar-block">
          <div class="radar-block-title">🍋 맛·향 프로필</div>
          ${tasteSVG}
        </div>
        <div class="radar-block">
          <div class="radar-block-title">🥃 베이스 스피릿 선호도</div>
          ${spiritSVG}
        </div>

    <section>
      <div class="sec-title">
        <span class="sec-icon">📊</span>

/* ── 이미지 저장 ── */
async function saveResult() {
  const el = document.getElementById('screen-result');
  // html2canvas 동적 로드
  if (!window.html2canvas) {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }
  const btn = document.querySelector('.btn-save');
  btn.textContent = '⏳ 저장 중...';
  btn.disabled = true;
  try {
    const canvas = await html2canvas(el, {
      backgroundColor: '#0f0c10',
      scale: 2,
      useCORS: true,
      logging: false,
    });
    const a = document.createElement('a');
    a.download = 'my-cocktail-taste.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  } catch(e) {
    alert('저장에 실패했습니다. 스크린샷을 이용해주세요.');
  }
  btn.textContent = '📥 이미지 저장';
  btn.disabled = false;
}

/* ── URL 인코딩 / 디코딩 ── */
function encodeResult() {
  // answers에서 skip 제외하고 압축
  const data = { n: nickname, a: {} };
  for (const [id, val] of Object.entries(answers)) {
    if (val !== 'skip') data.a[id] = val[0]; // 'like'→'l', 'meh'→'m', 'no'→'n'
  }
  return btoa(encodeURIComponent(JSON.stringify(data)));
}

function decodeResult(encoded) {
  try {
    const data = JSON.parse(decodeURIComponent(atob(encoded)));
    const decoded = { nickname: data.n, answers: {} };
    for (const [id, v] of Object.entries(data.a)) {
      decoded.answers[id] = v === 'l' ? 'like' : v === 'm' ? 'meh' : 'no';
    }
    return decoded;
  } catch { return null; }
}

/* ── 링크 공유 ── */
function shareLink() {
  const encoded = encodeResult();
  const url = `https://hyexjun.github.io/cocktail-taste?r=${encoded}`;
  if (navigator.share) {
    navigator.share({
      title: `${nickname}의 칵테일 취향`,
      text: '나의 칵테일 취향 결과 보러 오기 🍸',
      url
    });
  } else {
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('.btn-share');
      const orig = btn.textContent;
      btn.textContent = '✅ 링크 복사됨!';
      setTimeout(() => btn.textContent = orig, 2000);
    });
  }
}

/* ════════════════════════════════════════
   UTIL
════════════════════════════════════════ */
const DISPLAY = {
  'screen-intro':  'flex',
  'screen-quiz':   'flex',
  'screen-result': 'block',
};
/* ── 터치 스크롤 차단 ── */
function preventTouch(e) { e.preventDefault(); }

function show(id) {
  ['screen-intro','screen-quiz','screen-result'].forEach(s => {
    document.getElementById(s).style.display = (s === id) ? DISPLAY[s] : 'none';
  });
  const lockScroll = id === 'screen-quiz' || id === 'screen-intro';
  document.body.style.overflow = lockScroll ? 'hidden' : '';
  document.body.style.position = lockScroll ? 'fixed' : '';
  document.body.style.width = lockScroll ? '100%' : '';
  document.documentElement.style.overflow = lockScroll ? 'hidden' : '';
  if (lockScroll) {
    document.addEventListener('touchmove', preventTouch, { passive: false });
  } else {
    document.removeEventListener('touchmove', preventTouch);
  }
  window.scrollTo(0, 0);
}

/* ── 공유 링크로 들어왔을 때 결과 뷰 ── */
function showSharedResult(decoded) {
  answers = decoded.answers;
  nickname = decoded.nickname;
  showResult(true);
}

function restartQuiz() {
  history.replaceState(null, '', location.pathname);
  nickname = '';
  document.getElementById('nickname-input').value = '';
  document.getElementById('btn-start').disabled = true;
  show('screen-intro');
}

/* ── 페이지 로드 시 URL 체크 ── */
(function init() {
  const params = new URLSearchParams(location.search);
  const r = params.get('r');
  if (r) {
    const decoded = decodeResult(r);
    if (decoded) {
      showSharedResult(decoded);
      return;
    }
  }
  show('screen-intro');
})();
